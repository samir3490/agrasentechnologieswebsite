name: ARM Tests

on:
  push:
    branches: [main]
    paths:
      - "src/lib/arm/**"
      - "scripts/arm-smoke-test.mjs"
      - "vitest.config.mjs"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "src/lib/arm/**"
      - "scripts/arm-smoke-test.mjs"
      - "vitest.config.mjs"
      - "package.json"
      - "package-lock.json"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
