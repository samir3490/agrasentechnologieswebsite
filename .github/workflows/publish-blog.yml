name: Publish Scheduled Blog Posts

on:
  schedule:
    # Daily at 9:00 AM UTC — publishes any post whose date is today or earlier
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-scheduled-posts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check and publish scheduled posts
        run: node scripts/publish-scheduled.js

      - name: Configure git
        run: |
          git config user.name "Blog Bot"
          git config user.email "bot@agrasentechnologies.com"

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet; then
            git add -A
            git commit -m "Publish scheduled blog post(s)"
            git push
          else
            echo "No changes to commit"
          fi
